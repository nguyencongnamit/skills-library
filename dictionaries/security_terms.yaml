schema_version: "1.0"
last_updated: "2026-05-12"
terms:
  - term: "secret"
    definition: "Any string whose disclosure would grant unauthorized access or capability: API keys, passwords, tokens, private keys, connection strings, signing keys"
  - term: "credential"
    definition: "Identifying information used to authenticate (username + password, certificate + key, API key, OAuth token)"
  - term: "PII"
    definition: "Personally Identifiable Information — data that can identify a natural person (name, email, phone, government ID, biometric, IP address in some jurisdictions)"
  - term: "PHI"
    definition: "Protected Health Information (HIPAA) — health-related PII subject to additional regulations"
  - term: "PCI"
    definition: "Payment Card Industry data — primary account numbers, CVVs, magnetic stripe data"
  - term: "SBOM"
    definition: "Software Bill of Materials — inventory of all components, dependencies, and licenses in a software artifact"
  - term: "SAST"
    definition: "Static Application Security Testing — analysis of source code without executing it"
  - term: "DAST"
    definition: "Dynamic Application Security Testing — analysis of a running application via probing inputs/outputs"
  - term: "SCA"
    definition: "Software Composition Analysis — analysis of third-party dependencies for known vulnerabilities"
  - term: "CWE"
    definition: "Common Weakness Enumeration — catalogue of software weakness types maintained by MITRE"
  - term: "CVE"
    definition: "Common Vulnerabilities and Exposures — public catalogue of specific vulnerabilities maintained by MITRE"
  - term: "CVSS"
    definition: "Common Vulnerability Scoring System — standardized severity score for CVEs (0.0 to 10.0)"
  - term: "OWASP"
    definition: "Open Worldwide Application Security Project — nonprofit publishing security guidance and tools"
  - term: "MITRE ATT&CK"
    definition: "Curated knowledge base of adversary tactics, techniques, and procedures"
  - term: "BOLA"
    definition: "Broken Object Level Authorization — endpoint serving requested object without verifying caller has access (OWASP API1)"
  - term: "IDOR"
    definition: "Insecure Direct Object Reference — original name for BOLA; same root cause"
  - term: "SSRF"
    definition: "Server-Side Request Forgery — coerces server to make HTTP requests to attacker-chosen destinations"
  - term: "XSS"
    definition: "Cross-Site Scripting — injection of attacker-controlled script into a victim's browser (CWE-79)"
  - term: "CSRF"
    definition: "Cross-Site Request Forgery — attacker triggers state-changing request from authenticated victim browser (CWE-352)"
  - term: "SSTI"
    definition: "Server-Side Template Injection — user input rendered through template engine, enabling code execution"
  - term: "RCE"
    definition: "Remote Code Execution — attacker runs arbitrary code on the target system"
  - term: "PrivEsc"
    definition: "Privilege Escalation — attacker raises their access level on a system they already have some access to"
  - term: "MFA"
    definition: "Multi-Factor Authentication — authentication requiring two or more distinct factors"
  - term: "TOTP"
    definition: "Time-based One-Time Password — RFC 6238 algorithm for time-bucket-based MFA codes"
  - term: "JWT"
    definition: "JSON Web Token — RFC 7519 compact, URL-safe, signed token format"
  - term: "OAuth"
    definition: "Open Authorization — RFC 6749 protocol for delegated authorization between services"
  - term: "TLS"
    definition: "Transport Layer Security — encryption protocol for network traffic; modern replacement for SSL"
  - term: "mTLS"
    definition: "Mutual TLS — TLS where both client and server authenticate via certificates"
  - term: "CSP"
    definition: "Content Security Policy — HTTP response header restricting which resources a browser may load"
  - term: "HSTS"
    definition: "HTTP Strict Transport Security — header forcing clients to use HTTPS for subsequent requests"
  - term: "CORS"
    definition: "Cross-Origin Resource Sharing — mechanism allowing controlled cross-origin browser requests"
  - term: "WAF"
    definition: "Web Application Firewall — filter inspecting HTTP traffic to block known attack patterns"
  - term: "DLP"
    definition: "Data Leakage Prevention — controls preventing sensitive data from leaving a controlled environment"
