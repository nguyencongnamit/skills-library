schema_version: "2.0"
framework: "SLSA"
version: "v1.0 (Supply-chain Levels for Software Artifacts)"
last_updated: "2026-06-19"
# Maps SLSA v1.0 build-track requirements to prevention skills (advisory) and,
# where an automated detection exists, to runnable checks (verification). SLSA
# is a supply-chain integrity framework, so it reuses the malicious-package,
# typosquat, dependency, and build/CI checks directly. Requirements that
# depend on signing or platform attestation (which source scanning cannot
# observe) carry CWE identifiers but no `checks:`.
controls:
  - id: "producer.dependencies"
    title: "Screen Dependencies"
    description: "The producer screens all dependencies for known-malicious, typosquatted, and known-vulnerable components before use."
    skills: ["supply-chain-security", "dependency-audit"]
    checks: ["scan_dependencies", "check_dependency", "check_typosquat", "lookup_vulnerability"]
    cwe: ["CWE-1104", "CWE-1357", "CWE-937"]
    references: ["https://slsa.dev/spec/v1.0/requirements"]
  - id: "build.L1.provenance"
    title: "Build L1 — Provenance Exists"
    description: "The build process is fully defined as code and the platform can generate provenance describing how the artifact was produced."
    skills: ["cicd-security", "iac-security", "supply-chain-security"]
    checks: ["scan_github_actions"]
    cwe: ["CWE-345", "CWE-1188"]
  - id: "build.L2.signed"
    title: "Build L2 — Signed Provenance"
    description: "Provenance is generated by a hosted build platform and cryptographically signed so consumers can verify authenticity."
    skills: ["supply-chain-security", "cicd-security"]
    cwe: ["CWE-345", "CWE-347"]
  - id: "build.L3.hardened"
    title: "Build L3 — Hardened Build Platform"
    description: "Builds run in isolated, ephemeral environments; CI workflows are hardened with pinned actions, least-privilege tokens, and no injectable inputs."
    skills: ["cicd-security", "container-security"]
    checks: ["scan_github_actions", "scan_dockerfile"]
    cwe: ["CWE-829", "CWE-250"]
  - id: "build.secrets"
    title: "Protect Build Secrets"
    description: "Secrets are not embedded in build definitions, workflows, or source; build credentials are scoped and rotated."
    skills: ["secret-detection", "cicd-security"]
    checks: ["scan_secrets", "check_secret_pattern"]
    cwe: ["CWE-798", "CWE-532"]
  - id: "provenance.complete"
    title: "Complete Provenance"
    description: "Provenance lists all build inputs, including resolved dependencies and build parameters, so the artifact's composition is fully attested."
    skills: ["supply-chain-security"]
    checks: ["scan_dependencies", "lookup_vulnerability"]
    cwe: ["CWE-1104"]
  - id: "source.protected"
    title: "Source Integrity"
    description: "Source is version-controlled and protected from unauthorized or unreviewed changes."
    skills: ["supply-chain-security", "iam-best-practices"]
    cwe: ["CWE-284", "CWE-345"]
