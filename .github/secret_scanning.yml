# GitHub Advanced Security: exclude the secret-detection skill's
# own test corpus and the slack-bot-token eval prompt from secret
# scanning + push protection. Every value in these paths is either
# (a) a synthetic shape generated by scripts/expand-secret-corpus.py
# (token_hex / base62 fillers — no live credential exists for them),
# (b) a public vendor documentation placeholder
# (e.g. AKIAIOSFODNN7EXAMPLE from AWS IAM docs), or
# (c) part of a fixture deliberately demonstrating the anti-pattern
# of inlining credentials into agent prompts.
#
# This is the only safe way to ship a precision/recall benchmark
# corpus: the corpus MUST contain values that look like secrets,
# otherwise it cannot exercise the regexes it is testing.
paths-ignore:
  - skills/secret-detection/tests/corpus.json
  - evals/fixtures/secret-generation/**
  - evals/fixtures/secret-detection/**
