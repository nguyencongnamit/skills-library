name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mkdocs.yml'
      - 'docs/**'
      - 'landing/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # required for actions/checkout on a private repo;
                       # job-level permissions REPLACE the workflow-level
                       # `contents: read`, so it must be re-declared here.
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.7.6 pymdown-extensions

      - name: Build site
        run: mkdocs build --config-file mkdocs.yml --site-dir _site

      - name: Publish landing decks (HTML + PDF)
        run: |
          mkdir -p _site/decks
          cp landing/*.html landing/*.pdf _site/decks/ 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
