name: CodeQL

# Static analysis of the Go engine. Findings surface in the repository's
# Security > Code scanning tab. On a private repo this requires GitHub
# Advanced Security; it runs unconditionally once the repo is public.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      # Manual build (not autobuild) — the module builds with a plain
      # `go build ./...`, which is faster and more predictable than autobuild.
      - name: Build
        run: go build ./...

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
