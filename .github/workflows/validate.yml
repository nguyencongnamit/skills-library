name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  json-yaml-syntax:
    name: JSON + YAML syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Validate JSON files
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            fi
          done < <(find . -name '*.json' -not -path './.git/*')
          exit "$fail"

      - name: Validate YAML files
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" "$f"; then
              echo "::error file=$f::Invalid YAML"
              fail=1
            fi
          done < <(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path './.git/*')
          exit "$fail"

  skill-manifest-shape:
    name: SKILL.md frontmatter shape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet pyyaml

      - name: Check every SKILL.md has the required frontmatter fields
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import re, sys, pathlib, yaml

          required = {
              "id", "version", "title", "description", "category",
              "severity", "applies_to", "languages", "token_budget",
              "last_updated", "sources",
          }
          allowed_categories = {"prevention", "detection", "compliance", "supply-chain", "hardening"}
          allowed_severities = {"critical", "high", "medium", "low"}

          # Match YAML frontmatter delimited by lines containing only '---'.
          # Anchored at start-of-file; the closing '---' must be on its own line.
          frontmatter_re = re.compile(r"\A---\s*\n(.*?)\n---\s*(?:\n|\Z)", re.DOTALL)

          fail = 0
          for path in sorted(pathlib.Path("skills").rglob("SKILL.md")):
              text = path.read_text(encoding="utf-8")
              match = frontmatter_re.match(text)
              if not match:
                  print(f"::error file={path}::Missing or malformed YAML frontmatter (expected file to start with '---' line and contain a closing '---' line)")
                  fail = 1
                  continue
              fm = match.group(1)
              data = yaml.safe_load(fm) or {}
              missing = required - data.keys()
              if missing:
                  print(f"::error file={path}::Missing fields: {sorted(missing)}")
                  fail = 1
              if data.get("category") not in allowed_categories:
                  print(f"::error file={path}::Invalid category {data.get('category')!r}")
                  fail = 1
              if data.get("severity") not in allowed_severities:
                  print(f"::error file={path}::Invalid severity {data.get('severity')!r}")
                  fail = 1
              tb = data.get("token_budget") or {}
              for tier in ("minimal", "compact", "full"):
                  if tier not in tb:
                      print(f"::error file={path}::Missing token_budget.{tier}")
                      fail = 1
          sys.exit(fail)
          PY

  dist-skill-manifest-shape:
    name: dist/ SKILL.md frontmatter shape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet pyyaml

      - name: Check every dist/**/SKILL.md has a minimal frontmatter shape
        # The compiled bundles under dist/ target third-party agent
        # tools (Claude / Cursor / Codex / etc.) and only need the
        # cross-tool minimum: `name` + `description`. The richer
        # source-of-truth frontmatter (token_budget, severity, ...)
        # is enforced separately by the `skill-manifest-shape` job
        # on skills/**/SKILL.md. This second job exists to catch a
        # `regenerate` regression that would otherwise ship a
        # native bundle missing the required keys.
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import re, sys, pathlib, yaml

          required = {"name", "description"}
          frontmatter_re = re.compile(r"\A---\s*\n(.*?)\n---\s*(?:\n|\Z)", re.DOTALL)

          fail = 0
          paths = sorted(pathlib.Path("dist").rglob("SKILL.md"))
          if not paths:
              print("::warning::no dist/**/SKILL.md files found; skipping")
              sys.exit(0)
          for path in paths:
              text = path.read_text(encoding="utf-8")
              match = frontmatter_re.match(text)
              if not match:
                  print(f"::error file={path}::Missing or malformed YAML frontmatter (expected file to start with '---' line and contain a closing '---' line)")
                  fail = 1
                  continue
              try:
                  data = yaml.safe_load(match.group(1)) or {}
              except yaml.YAMLError as e:
                  print(f"::error file={path}::Frontmatter is not valid YAML: {e}")
                  fail = 1
                  continue
              if not isinstance(data, dict):
                  print(f"::error file={path}::Frontmatter must be a YAML mapping")
                  fail = 1
                  continue
              missing = required - data.keys()
              if missing:
                  print(f"::error file={path}::Missing fields: {sorted(missing)}")
                  fail = 1
              # A missing key is already reported above; only run
              # the value-shape check on keys that actually exist
              # so contributors don't see two errors for the same
              # field in their CI logs.
              for field in required - missing:
                  val = data.get(field)
                  if not isinstance(val, str) or not val.strip():
                      print(f"::error file={path}::Field {field!r} must be a non-empty string")
                      fail = 1
          sys.exit(fail)
          PY

  markdown-link-sanity:
    name: Markdown link sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for obviously broken relative links
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r md; do
            while IFS= read -r link; do
              # Strip surrounding ()  and any anchor
              target="${link#(}"
              target="${target%)*}"
              target="${target%%#*}"
              # Skip external links and template references
              case "$target" in
                http*|mailto:*|"") continue ;;
              esac
              base_dir="$(dirname "$md")"
              if [ ! -e "$base_dir/$target" ]; then
                echo "::error file=$md::Broken relative link: $target"
                fail=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$md" | grep -oE '\([^)]+\)' || true)
          done < <(find . -name '*.md' -not -path './.git/*' -not -path './dist/*')
          exit "$fail"

  rule-file-schema:
    name: Rule file schema (skills/**/{rules,checklists,frameworks,tests}/*)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Check rule and vulnerability files declare schema_version
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import json, sys, pathlib, yaml
          fail = 0
          # Skill subdirectories that contain rules / checklists / frameworks /
          # tests are required to declare schema_version on every JSON/YAML.
          roots = ["rules", "checklists", "frameworks", "tests"]
          checked = []
          for skill_dir in sorted(pathlib.Path("skills").iterdir()):
              if not skill_dir.is_dir():
                  continue
              for sub in roots:
                  d = skill_dir / sub
                  if not d.exists():
                      continue
                  for p in sorted(d.rglob("*")):
                      if p.suffix in {".json", ".yaml", ".yml"}:
                          checked.append(p)
          # Vulnerability data files all need schema_version + last_updated.
          for p in sorted(pathlib.Path("vulnerabilities").rglob("*.json")):
              if p.name == "manifest.json":
                  continue
              checked.append(p)
          require_last_updated_root = pathlib.Path("vulnerabilities")
          for p in checked:
              text = p.read_text(encoding="utf-8")
              try:
                  data = json.loads(text) if p.suffix == ".json" else yaml.safe_load(text)
              except Exception as e:
                  print(f"::error file={p}::Parse error: {e}")
                  fail = 1
                  continue
              if not isinstance(data, dict):
                  continue
              if "schema_version" not in data:
                  print(f"::error file={p}::Missing required key 'schema_version'")
                  fail = 1
              if require_last_updated_root in p.parents and "last_updated" not in data:
                  print(f"::error file={p}::Missing required key 'last_updated'")
                  fail = 1
          sys.exit(fail)
          PY

  go-build-test:
    name: skills-check (build, vet, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy'."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: gofmt
        run: |
          unformatted=$(gofmt -l ./cmd)
          if [ -n "$unformatted" ]; then
            echo "::error::Run gofmt -w on:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -trimpath -ldflags "-s -w" -o /tmp/skills-check ./cmd/skills-check

      - name: skills-check validate (enforces token budgets)
        run: /tmp/skills-check validate --path .

  dist-regeneration:
    name: dist/ matches skills/
    needs: go-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Build skills-check
        run: go build -trimpath -ldflags "-s -w" -o /tmp/skills-check ./cmd/skills-check

      - name: Regenerate dist/ and diff
        shell: bash
        run: |
          set -e
          /tmp/skills-check regenerate --path .
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ files are out of date. Run 'skills-check regenerate' and commit."
            exit 1
          fi

  manifest-checksums:
    name: manifest checksums match repo contents
    needs: go-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Build skills-check
        run: go build -trimpath -ldflags "-s -w" -o /tmp/skills-check ./cmd/skills-check

      - name: skills-check manifest verify --checksums-only
        run: /tmp/skills-check manifest verify --path . --checksums-only

  vulnerability-references:
    name: every vulnerability entry has at least one external reference URL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check references
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import json, sys, pathlib

          fail = 0
          # Every entry under vulnerabilities/ that has a "name" or "cve" must
          # ship at least one external reference URL. Files that aggregate
          # entries under "entries" are walked.
          for path in sorted(pathlib.Path("vulnerabilities").rglob("*.json")):
              if path.name == "manifest.json":
                  continue
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as e:
                  print(f"::error file={path}::Invalid JSON: {e}")
                  fail = 1
                  continue
              entries = []
              if isinstance(data, dict):
                  if isinstance(data.get("entries"), list):
                      entries = data["entries"]
                  # files like patterns.json with namespace_patterns/heuristics
                  # also count as entry-bearing; require top-level references too
                  if not entries and not data.get("references"):
                      # only require this for files with concrete vulnerability or
                      # CVE content; skip empty schemas
                      if any(k in data for k in ("cve", "name", "entries")):
                          print(f"::error file={path}::Missing top-level 'references' URL")
                          fail = 1
              for ent in entries:
                  if not isinstance(ent, dict):
                      continue
                  refs = ent.get("references") or []
                  if not isinstance(refs, list) or not any(isinstance(r, str) and r.startswith("http") for r in refs):
                      ident = ent.get("name") or ent.get("cve") or ent.get("typosquat") or "<unknown>"
                      print(f"::error file={path}::Entry {ident!r} missing external reference URL")
                      fail = 1
          sys.exit(fail)
          PY

  last-updated-check:
    name: last_updated is bumped when content changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet pyyaml

      - name: Verify modified skills / vuln files bumped last_updated
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -e
          git fetch --no-tags --depth=50 origin "$BASE_REF" || true
          BASE_SHA=$(git rev-parse "origin/$BASE_REF" 2>/dev/null || git rev-parse "$BASE_REF" 2>/dev/null || echo "")
          if [ -z "$BASE_SHA" ]; then
            echo "::warning::could not resolve base ref $BASE_REF; skipping check"
            exit 0
          fi
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=AM "$BASE_SHA"...HEAD -- 'skills/**' 'vulnerabilities/**' || true)
          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "no skill / vuln changes; skipping"
            exit 0
          fi
          python - "$BASE_SHA" "${CHANGED[@]}" <<'PY'
          import json, re, subprocess, sys, pathlib, yaml

          base_sha = sys.argv[1]
          changed = sys.argv[2:]

          def base_text(path):
              try:
                  return subprocess.check_output(["git", "show", f"{base_sha}:{path}"], stderr=subprocess.DEVNULL).decode("utf-8")
              except subprocess.CalledProcessError:
                  return None

          def field(text, path):
              if text is None:
                  return None
              if path.endswith(".json"):
                  try:
                      return json.loads(text).get("last_updated")
                  except json.JSONDecodeError:
                      return None
              if path.endswith("SKILL.md"):
                  m = re.match(r"\A---\s*\n(.*?)\n---", text, re.DOTALL)
                  if not m:
                      return None
                  try:
                      return (yaml.safe_load(m.group(1)) or {}).get("last_updated")
                  except yaml.YAMLError:
                      return None
              return None

          fail = 0
          for path in changed:
              if not (path.endswith(".json") or path.endswith("SKILL.md")):
                  continue
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              head_text = p.read_text(encoding="utf-8")
              head_value = field(head_text, path)
              base_value = field(base_text(path), path)
              if head_value is None:
                  # file does not declare last_updated; skip — schema is checked elsewhere
                  continue
              if base_value is not None and base_value == head_value:
                  print(f"::error file={path}::last_updated must be bumped when the file changes (was {base_value})")
                  fail = 1
          sys.exit(fail)
          PY

  data-quality-report:
    name: DATA_QUALITY.md is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify DATA_QUALITY.md matches the live corpus
        run: python3 scripts/generate-data-quality.py --check

  scanner-eval:
    name: Scanner eval (dependencies / cicd / dockerfile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build skills-mcp
        run: go build -o skills-mcp ./cmd/skills-mcp

      - name: Run scanner-eval harness
        run: |
          python3 evals/benchmarks/scanner-eval.py \
            --skills-mcp ./skills-mcp \
            --out evals/baselines/scanner-eval-static.md \
            --verbose

  locale-freshness:
    name: Locale freshness (source_revision + translation pending banners)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need git history so source_revision SHAs can be looked up.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run locale freshness check
        run: python3 scripts/check-locale-freshness.py
