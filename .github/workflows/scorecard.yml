name: Scorecard supply-chain security

# OpenSSF Scorecard — scores the repo's supply-chain posture (branch
# protection, signed releases, pinned dependencies, token permissions, …).
# Results upload to Security > Code scanning. publish_results lights up the
# public Scorecard badge/API once the repository is public; it is a no-op
# while the repo is private.

on:
  branch_protection_rule:
  schedule:
    - cron: "31 5 * * 1" # Mondays 05:31 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
