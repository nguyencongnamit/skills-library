# Fixture: stored-credentials.yml
#
# Workflow that authenticates to AWS using a stored long-lived
# access key pair in GitHub Secrets (the exfiltration target in
# every major CI cloud-key incident) instead of short-lived OIDC.
# Expected to trip gha-oidc-cloud-credentials. Also lacks a top-
# level permissions block so gha-default-permissions-read fires.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: configure aws
        run: |
          mkdir -p ~/.aws
          printf "[default]\naws_access_key_id=%s\naws_secret_access_key=%s\n" \
            "${{ secrets.AWS_ACCESS_KEY_ID }}" \
            "${{ secrets.AWS_SECRET_ACCESS_KEY }}" > ~/.aws/credentials
      - name: deploy
        run: aws s3 sync ./build s3://my-bucket
