# Fixture: 'actions/checkout@v4' is a tag, not a SHA. Tags can be
# moved by the action's owner, so a compromised maintainer (or a
# supply-chain attack like the one against 'tj-actions/changed-files'
# in 2025) can swap the underlying code without changing the ref.
# See skills/cicd-security/checklists/github_actions_hardening.yaml
# rule 'pinned-sha' and https://github.com/step-security/secure-repo
# for the broader threat model.
name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "building..."
