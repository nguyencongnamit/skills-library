apiVersion: v1
kind: Pod
metadata:
  name: secure
spec:
  containers:
    - name: app
      image: myapp@sha256:abc
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE
