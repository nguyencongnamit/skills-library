apiVersion: v1
kind: Pod
metadata:
  name: insecure
spec:
  hostNetwork: true
  containers:
    - name: app
      image: myapp@sha256:abc
      securityContext:
        privileged: true
        runAsUser: 0
        capabilities:
          drop:
            - ALL
          add:
            - SYS_ADMIN
  volumes:
    - name: host
      hostPath:
        path: /
