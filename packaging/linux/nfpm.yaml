# nfpm configuration for the skills-check Linux .deb and .rpm packages.
#
# Build:
#   make BINARY=../../dist-build/skills-check-linux-amd64 VERSION=2026.05.13
#
# nfpm reference: https://nfpm.goreleaser.com/configuration/
name: skills-check
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Skills Library <ken@uney.com>
description: |
  Open-source security skills, rules, and vulnerability intelligence for
  AI-assisted coding tools. The skills-check binary validates skill manifests,
  generates IDE-specific configuration files, and pulls signed updates of
  vulnerability data and detection rules.
vendor: Skills Library
homepage: https://github.com/kennguy3n/skills-library
license: MIT
contents:
  - src: ${BINARY}
    dst: /usr/local/bin/skills-check
    file_info:
      mode: 0755
deb:
  fields:
    Bugs: https://github.com/kennguy3n/skills-library/issues
rpm:
  group: Applications/System
  summary: Skills Library CLI
