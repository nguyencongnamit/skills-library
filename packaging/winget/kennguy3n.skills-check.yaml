# Winget manifest for skills-check.
#
# To submit:
#   1. Update PackageVersion to match the release tag.
#   2. Replace InstallerUrl and InstallerSha256 with the MSI URL and SHA-256.
#   3. Run: winget validate --manifest .
#   4. Open a PR against microsoft/winget-pkgs with this file split into the
#      three required manifest files (installer, defaultLocale, version).
PackageIdentifier: kennguy3n.skills-check
PackageVersion: 0.0.0
PackageLocale: en-US
Publisher: Skills Library
PublisherUrl: https://github.com/kennguy3n/skills-library
PublisherSupportUrl: https://github.com/kennguy3n/skills-library/issues
PackageName: skills-check
PackageUrl: https://github.com/kennguy3n/skills-library
License: MIT
LicenseUrl: https://github.com/kennguy3n/skills-library/blob/main/LICENSE
ShortDescription: Skills Library CLI for AI-assisted coding tools.
Description: |
  skills-check is the command-line interface for the open-source Skills
  Library. It validates skill manifests, generates IDE-specific configuration
  files for Claude Code / Cursor / Copilot / Codex / Windsurf / Cline / Devin,
  and pulls signed updates of vulnerability data and detection rules.
Moniker: skills-check
Tags:
  - security
  - ai
  - cli
  - skills-library
InstallerType: msi
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/kennguy3n/skills-library/releases/download/v0.0.0/skills-check.msi
    InstallerSha256: REPLACE_WITH_MSI_SHA256
    Scope: machine
ReleaseDate: 2026-05-13
ManifestType: singleton
ManifestVersion: 1.6.0
