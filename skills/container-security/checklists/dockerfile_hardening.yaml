schema_version: "1.0"
framework: CIS Docker Benchmark v1.6 + NIST SP 800-190
last_updated: "2026-06-02"
generated_from: skills/container-security/SKILL.md
patterns:
  - id: dkr-multi-stage
    severity: high
    rule: Dockerfile uses multi-stage builds; final stage doesn't carry build toolchain
  - id: dkr-pinned-base-digest
    severity: high
    rule: Final FROM is pinned by @sha256:<digest>
    cwe: 1357
  - id: dkr-non-root-user
    severity: critical
    rule: Dockerfile ends with USER <numeric-uid>; uid >= 10000 to satisfy K8s runAsNonRoot policies
    cwe: 250
  - id: dkr-dockerignore-exists
    severity: high
    rule: A .dockerignore file exists and excludes .git, node_modules, .env*, *.pem, *.key, dist/, coverage/
  - id: dkr-no-secrets-in-env
    severity: critical
    rule: No ENV/ARG sets API keys, DB credentials, or tokens; use --secret mounts or runtime injection
    cwe: 798
  - id: dkr-healthcheck-defined
    severity: medium
    rule: Long-running services have HEALTHCHECK
  - id: dkr-no-add-remote
    severity: medium
    rule: ADD is not used to fetch http(s) resources; use RUN curl --fail with checksum verify
  - id: dkr-no-curl-pipe-sh
    severity: critical
    rule: Build does not run curl|sh, wget -O-|sh, or similar pipes from untrusted hosts
    cwe: 829
  - id: dkr-no-secret-leak-in-layers
    severity: critical
    rule: Secrets are mounted with RUN --mount=type=secret, not COPY'd or ENV'd
  - id: dkr-image-scan-required
    severity: high
    rule: CI runs Trivy/Grype/Snyk on the built image and fails on CRITICAL
  - id: dkr-sbom-emitted
    severity: medium
    rule: Build emits an SBOM (syft / docker sbom) and attaches it to the image
  - id: dkr-build-with-buildkit
    severity: low
    rule: BuildKit is enabled to get secret-mount support and better cache isolation
  - id: dkr-eol-base-image
    severity: critical
    rule: Use **end-of-life base images**. As of mid-2026 this includes `node:< 18`, `python:< 3.10`, `alpine:< 3.17`, `debian:< 11 (bullseye)`, `ubuntu:< 20.04`, `centos:*`, `ruby:< 3.1`, and any non-LTS Node/Python release. EOL images stop receiving security patches; a maintained image with no public CVEs is still safer than an EOL one. Pin via `endoflife.date/<runtime>` if the runtime is unfamiliar.
    cwe: 1104
  - id: dkr-missing-user-directive
    severity: critical
    rule: 'Run as a non-root user: `USER <uid>` (numeric UID >= 10000 for K8s `runAsNonRoot` policies to be enforceable). Set USER explicitly on the **final stage** — omitting USER entirely leaves the container running as root by default, which is the same as `USER root`.'
    cwe: 250
  - id: dkr-npm-install-not-ci
    severity: medium
    rule: Use **`npm ci`** (and equivalents `pnpm install --frozen-lockfile`, `yarn install --frozen-lockfile`) in container builds, not `npm install`. `npm install` mutates the lockfile and resolves versions per-build, producing non-deterministic images that drift from the lockfile.
