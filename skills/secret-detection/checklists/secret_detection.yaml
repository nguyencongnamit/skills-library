schema_version: '1.1'
last_updated: '2026-06-02'
framework: secret_detection
description: |-
  Unified secret-detection rules for the secret-detection skill — regex patterns and false-positive exclusions. Migrated from rules/dlp_patterns.json + rules/dlp_exclusions.json in PR-B1. The legacy i18n hotword sidecar (dlp_patterns.locales.json) was dropped: it was AI-drafted, never native-speaker-reviewed, and added maintenance burden disproportionate to its real-world recall (non-English codebases overwhelmingly keep English identifier names). Loader treats `checks` entries with type: secret_pattern as secret patterns; other types remain for forward compatibility with derive-checklists output.
references:
- https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
- https://cwe.mitre.org/data/definitions/798.html
- https://cwe.mitre.org/data/definitions/259.html
checks:
- id: aws-access-key
  type: secret_pattern
  title: AWS Access Key
  severity: critical
  pattern: AKIA[0-9A-Z]{16}
  prefix: AKIA
  score_weight: 1
  hotwords:
  - aws
  - access_key
  - credentials
  - iam
  - secret
  hotword_window: 200
  hotword_boost: 2
  require_hotword: false
  entropy_min: 3.5
  denylist_substrings:
  - EXAMPLE
  - AKIAIOSFODNN7
  references: []
- id: aws-secret-access-key
  type: secret_pattern
  title: AWS Secret Access Key
  severity: critical
  pattern: (?i)aws[_\-]?secret[_\-]?access[_\-]?key\s*[:=]\s*['"]?[A-Za-z0-9/+=]{40}['"]?
  prefix: aws_secret
  score_weight: 2
  hotwords:
  - aws
  - secret
  - access_key
  hotword_window: 200
  hotword_boost: 2
  require_hotword: false
  entropy_min: 4.0
  references: []
