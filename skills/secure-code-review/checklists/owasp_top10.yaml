schema_version: "1.0"
framework: "OWASP Top 10 2021"
last_updated: "2026-05-12"
items:
  - id: A01
    title: "Broken Access Control"
    cwe_refs: [22, 23, 35, 200, 201, 219, 264, 275, 276, 284, 285, 352, 359, 377, 402, 425, 441, 497, 538, 540, 552, 566, 601, 639, 651, 668, 706, 862, 863, 913, 922, 1275]
    ai_check: "Confirm authentication and authorization on every non-public endpoint; default deny."
  - id: A02
    title: "Cryptographic Failures"
    cwe_refs: [261, 296, 310, 319, 321, 322, 323, 324, 325, 326, 327, 328, 329, 330, 331, 335, 336, 337, 338, 340, 347, 523, 720, 757, 759, 760, 780, 818, 916]
    ai_check: "No MD5/SHA1 for security; AES-GCM/ChaCha20 for encryption; Argon2id/bcrypt for passwords."
  - id: A03
    title: "Injection"
    cwe_refs: [20, 74, 75, 77, 78, 79, 80, 83, 87, 88, 89, 90, 91, 93, 94, 95, 96, 97, 98, 99, 100, 113, 116, 138, 184, 470, 471, 564, 610, 643, 644, 652, 917]
    ai_check: "Parameterized queries only. No shell=True. No eval()."
  - id: A04
    title: "Insecure Design"
    cwe_refs: [73, 183, 209, 213, 235, 256, 257, 266, 269, 280, 311, 312, 313, 316, 419, 430, 434, 444, 451, 472, 501, 522, 525, 539, 579, 598, 602, 642, 646, 650, 653, 656, 657, 799, 807, 840, 841, 927, 1021, 1173]
    ai_check: "Apply secure design patterns: separation of duties, least privilege, defense in depth."
  - id: A05
    title: "Security Misconfiguration"
    cwe_refs: [2, 11, 13, 15, 16, 260, 315, 520, 526, 537, 541, 547, 611, 614, 756, 776, 942, 1004, 1032, 1174]
    ai_check: "Disable debug mode in prod; remove default credentials; harden HTTP headers."
  - id: A06
    title: "Vulnerable and Outdated Components"
    cwe_refs: [937, 1035, 1104]
    ai_check: "Pin versions; consult vulnerability DB; prefer maintained packages."
  - id: A07
    title: "Identification and Authentication Failures"
    cwe_refs: [255, 259, 287, 288, 290, 294, 295, 297, 300, 302, 304, 306, 307, 346, 384, 521, 613, 620, 640, 798, 940, 1216]
    ai_check: "MFA where possible; rate limit auth; secure session management; short-lived tokens."
  - id: A08
    title: "Software and Data Integrity Failures"
    cwe_refs: [345, 353, 426, 494, 502, 565, 784, 829, 830, 915]
    ai_check: "Verify integrity of CI artifacts; pin dependencies by hash; signed releases."
  - id: A09
    title: "Security Logging and Monitoring Failures"
    cwe_refs: [117, 223, 532, 778]
    ai_check: "Log auth/admin/access events. Don't log secrets/PII. Centralize logs."
  - id: A10
    title: "Server-Side Request Forgery (SSRF)"
    cwe_refs: [918]
    ai_check: "Allowlist outbound URLs; block private IP ranges; validate redirect targets."
