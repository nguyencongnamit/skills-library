site_name: SecureVibe
site_description: Prevention-first security for AI-written code — signed security skills, deterministic scanners, and a CI gate for AI coding assistants (Claude Code, Cursor, Copilot, Codex, Windsurf, Cline, Antigravity, Devin).
site_url: https://nguyencongnamit.github.io/skills-library/
repo_url: https://github.com/nguyencongnamit/skills-library
repo_name: nguyencongnamit/skills-library
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - header.autohide
  icon:
    repo: fontawesome/brands/github
  font:
    text: -apple-system, BlinkMacSystemFont, Inter, Segoe UI, system-ui, sans-serif
    code: SF Mono, Menlo, JetBrains Mono, monospace

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nguyencongnamit/skills-library
  generator: false

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Get Started:
    - Quick Start: quickstart.md
    - Install on macOS: install-macos.md
    - Install on Linux: install-linux.md
    - Install on Windows: install-windows.md
    - Air-gapped Install: air-gapped-install.md
  - Contribute:
    - Contribute a Finding (LEARN loop): contribute.md
  - Admin:
    - Team Rollout: admin-team-rollout.md
