<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2540"/>
      <stop offset="0.55" stop-color="#0f3a4f"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(80,86)">
    <rect x="0" y="0" width="72" height="72" rx="16" fill="#0f766e"/>
    <rect x="0" y="0" width="72" height="72" rx="16" fill="none" stroke="#5eead4" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="36" y="50" text-anchor="middle" font-size="40" font-weight="800" fill="#ffffff">⬡</text>
  </g>

  <!-- wordmark + meta -->
  <g transform="translate(176,96)">
    <text x="0" y="34" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-0.5">vibe-guard</text>
    <text x="0" y="58" font-size="14" font-weight="500" fill="#9fc6c0" letter-spacing="0.5">ShieldNet360 ecosystem · generation-time security</text>
  </g>

  <!-- version pill -->
  <g transform="translate(176,176)">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#ccfbf1"/>
    <text x="60" y="23" text-anchor="middle" font-size="16" font-weight="800" fill="#0f766e" letter-spacing="0.5">v0.5.0</text>
    <text x="138" y="23" font-size="14" font-weight="600" fill="#7dd3c8" letter-spacing="1.5">RELEASE</text>
  </g>

  <!-- headline -->
  <text x="176" y="268" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.4">SARIF output from <tspan fill="#5eead4">gate</tspan> — findings, now legible to every CI.</text>
  <text x="176" y="300" font-size="16" font-weight="500" fill="#a9c7c2">Block insecure AI-written code at the CI gate · deterministic · offline · Ed25519-signed · MIT</text>

  <!-- right-side rail motif: prevent -> gate -> code scanning -->
  <g transform="translate(910,150)">
    <line x1="0" y1="0" x2="300" y2="0" stroke="url(#rail)" stroke-width="3" stroke-linecap="round" filter="url(#soft)"/>
    <g>
      <circle cx="0" cy="0" r="9" fill="#0e2540" stroke="#5eead4" stroke-width="3"/>
      <text x="0" y="-22" text-anchor="middle" font-size="11" font-weight="700" fill="#7dd3c8" letter-spacing="0.5">PREVENT</text>
      <text x="0" y="30" text-anchor="middle" font-size="10" fill="#8fb6b1">skills</text>
    </g>
    <g transform="translate(150,0)">
      <circle cx="0" cy="0" r="12" fill="#5eead4"/>
      <circle cx="0" cy="0" r="5" fill="#0e2540"/>
      <text x="0" y="-22" text-anchor="middle" font-size="11" font-weight="800" fill="#ffffff" letter-spacing="0.5">GATE</text>
      <text x="0" y="30" text-anchor="middle" font-size="10" fill="#8fb6b1">→ SARIF</text>
    </g>
    <g transform="translate(300,0)">
      <circle cx="0" cy="0" r="9" fill="#0e2540" stroke="#5eead4" stroke-width="3"/>
      <text x="0" y="-22" text-anchor="middle" font-size="11" font-weight="700" fill="#7dd3c8" letter-spacing="0.5">CODE SCAN</text>
      <text x="0" y="30" text-anchor="middle" font-size="10" fill="#8fb6b1">GitHub AS</text>
    </g>
  </g>
</svg>
